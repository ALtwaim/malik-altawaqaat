<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الدوري الخاص — ملك التوقعات</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="/style.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#ffd43b;--gold-dim:rgba(255,212,59,.12);--gold-border:rgba(255,212,59,.25);
  --bg:#060e1c;--surface:#0c1729;--surface2:#101f38;
  --text:#e8edf8;--muted:#7a90b5;
  --green:#22c55e;--red:#ef4444;
  --radius:18px;--radius-sm:12px;
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse 80% 50% at 80% -10%,rgba(36,59,115,.45) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 10% 90%,rgba(15,30,80,.3) 0%,transparent 55%);}

/* NAV */
.nav{height:64px;background:rgba(6,14,28,.9);border-bottom:1px solid var(--gold-border);
  display:flex;align-items:center;justify-content:space-between;padding:0 40px;
  position:sticky;top:0;z-index:200;backdrop-filter:blur(12px);}
.logo{color:var(--gold);font-size:20px;font-weight:900;text-decoration:none;display:flex;align-items:center;gap:8px}
.nav-links{display:flex;gap:6px}
.nav-links a{color:var(--muted);text-decoration:none;font-size:14px;font-weight:600;
  padding:7px 14px;border-radius:30px;transition:.2s;display:flex;align-items:center;gap:5px}
.nav-links a:hover,.nav-links a.active{color:var(--text);background:var(--surface2)}

/* CONTAINER & GRID */
.container{width:92%;max-width:1100px;margin:0 auto;padding:32px 0 80px}
.grid{display:grid;grid-template-columns:1fr 340px;gap:22px;align-items:start}

/* HERO */
.hero-bar{background:var(--surface);border:1px solid rgba(255,255,255,.07);
  border-radius:22px;padding:24px 28px;margin-bottom:22px;
  display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
.hero-left{display:flex;align-items:center;gap:16px}
.hero-icon{width:58px;height:58px;border-radius:16px;background:var(--gold-dim);
  border:2px solid var(--gold-border);display:flex;align-items:center;justify-content:center;font-size:26px}
.hero-info h1{font-size:24px;font-weight:900;color:var(--gold);margin-bottom:4px}
.hero-meta{display:flex;gap:8px;flex-wrap:wrap}
.meta-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;
  font-size:12px;font-weight:700;background:var(--surface2);color:var(--muted);
  border:1px solid rgba(255,255,255,.07)}
.meta-pill.gold{background:var(--gold-dim);color:var(--gold);border-color:var(--gold-border)}

.code-box{background:var(--gold-dim);border:1px solid var(--gold-border);border-radius:14px;
  padding:14px 18px;display:flex;align-items:center;gap:14px}
.code-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:2px}
.code-val{font-size:24px;font-weight:900;color:var(--gold);letter-spacing:4px}
.copy-btn{background:var(--surface2);border:1px solid rgba(255,255,255,.1);border-radius:8px;
  padding:8px 14px;color:var(--text);font-size:13px;font-weight:700;cursor:pointer;
  font-family:'Cairo',sans-serif;display:flex;align-items:center;gap:6px;transition:.15s}
.copy-btn:hover{border-color:var(--gold);color:var(--gold)}

/* CARD */
.card{background:var(--surface);border:1px solid rgba(255,255,255,.07);
  border-radius:22px;padding:24px;box-shadow:0 16px 40px rgba(0,0,0,.3)}
.card-title{font-size:16px;font-weight:800;color:var(--gold);
  margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;gap:8px}

/* LEADERBOARD */
.lb-row{display:flex;align-items:center;gap:12px;padding:12px 14px;
  border-radius:var(--radius-sm);margin-bottom:8px;
  background:var(--surface2);border:1px solid rgba(255,255,255,.05);transition:.15s}
.lb-row:hover{border-color:rgba(255,212,59,.2)}
.lb-row.me{border-color:var(--gold-border);background:var(--gold-dim)}
.rank{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;flex-shrink:0;background:rgba(255,255,255,.06);color:var(--muted)}
.rank.r1{background:linear-gradient(135deg,#ffd43b,#f0a500);color:#060e1c}
.rank.r2{background:linear-gradient(135deg,#c0c0c0,#a0a0a0);color:#060e1c}
.rank.r3{background:linear-gradient(135deg,#cd7f32,#a0522d);color:#fff}
.lb-name{flex:1;font-weight:700;font-size:15px}
.lb-pts{font-size:18px;font-weight:900;color:var(--gold);display:flex;align-items:baseline;gap:4px}
.lb-pts span{font-size:11px;color:var(--muted);font-weight:600}

/* FEATURES CARDS */
.feat-card{background:var(--surface2);border:1.5px solid rgba(255,255,255,.07);
  border-radius:var(--radius);padding:16px;margin-bottom:12px;transition:.2s}
.feat-card.enabled{border-color:rgba(255,212,59,.2)}
.feat-card.disabled{opacity:.4;pointer-events:none}
.feat-top{display:flex;align-items:center;gap:12px}
.feat-icon{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.feat-info{flex:1}
.feat-name{font-size:14px;font-weight:800}
.feat-desc{font-size:11px;color:var(--muted);margin-top:2px}
.feat-status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
.feat-status.on{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.feat-status.off{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid rgba(255,255,255,.08)}

/* USAGE BAR */
.usage-bar-wrap{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.06)}
.usage-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
.usage-label strong{color:var(--text)}
.bar-bg{height:6px;border-radius:10px;background:rgba(255,255,255,.07);overflow:hidden}
.bar-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--gold),#f0a500);transition:width .4s}
.bar-fill.full{background:linear-gradient(90deg,var(--red),#dc2626)}

/* USE BUTTON */
.use-btn{margin-top:12px;width:100%;padding:10px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--gold),#f0a500);color:#060e1c;
  font-family:'Cairo',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:.2s}
.use-btn:hover{opacity:.9}
.use-btn:disabled{opacity:.4;cursor:not-allowed;background:rgba(255,255,255,.1);color:var(--muted)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:#0c1729;border:1px solid var(--gold-border);border-radius:24px;
  width:100%;max-width:480px;padding:28px;position:relative;
  transform:translateY(20px);transition:transform .25s;max-height:85vh;overflow-y:auto}
.overlay.open .modal{transform:translateY(0)}
.modal-close{position:absolute;top:14px;left:14px;background:none;border:none;
  color:var(--muted);font-size:22px;cursor:pointer;line-height:1;transition:color .2s}
.modal-close:hover{color:var(--text)}
.modal h2{font-size:20px;font-weight:900;color:var(--gold);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.modal p{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:16px}
.modal select, .modal input[type=number]{
  width:100%;padding:12px 14px;background:var(--surface2);
  border:1.5px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);
  color:var(--text);font-family:'Cairo',sans-serif;font-size:15px;outline:none;
  margin-bottom:16px;transition:border-color .2s}
.modal select:focus, .modal input:focus{border-color:var(--gold)}
.modal select option{background:#0c1729}
.modal-actions{display:flex;gap:10px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:var(--radius-sm);
  font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:.2s}
.btn-gold{background:linear-gradient(135deg,var(--gold),#f0a500);color:#060e1c;flex:1;justify-content:center}
.btn-gold:hover{opacity:.9}
.btn-outline{background:transparent;border:1.5px solid rgba(255,255,255,.1);color:var(--muted);padding:12px 16px}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}

/* LOADING / EMPTY */
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px;color:var(--muted);font-size:14px}
.spinner{width:20px;height:20px;border:2px solid rgba(255,212,59,.2);
  border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-box{text-align:center;padding:30px;color:var(--muted);font-size:14px}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#1a2d50;border:1px solid var(--gold-border);border-radius:12px;
  padding:11px 22px;font-size:14px;font-weight:600;color:var(--gold);
  opacity:0;transition:.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:820px){
  .grid{grid-template-columns:1fr}
  .nav{padding:0 16px}
  .hero-bar{flex-direction:column;align-items:flex-start}
}
@media(max-width:600px){
  .container{width:96%;padding:20px 0 60px}
}
</style>
</head>
<body>

<nav class="nav">
  <a class="logo" href="/dashboard"><i class="bi bi-award-fill"></i> ملك التوقعات</a>
  <div class="nav-links">
    <a href="/dashboard"><i class="bi bi-house-fill"></i> الرئيسية</a>
    <a href="/predict"><i class="bi bi-lightning-charge-fill"></i> توقع</a>
    <a href="/private-leagues" class="active"><i class="bi bi-shield-fill"></i> الدوريات</a>
  </div>
</nav>

<div class="container">

  <!-- Loading -->
  <div id="pageLoading" class="loading"><div class="spinner"></div> جاري التحميل...</div>

  <!-- Error -->
  <div id="pageError" style="display:none" class="empty-box">
    <i class="bi bi-exclamation-triangle" style="font-size:36px;color:var(--red);display:block;margin-bottom:12px"></i>
    تعذر تحميل الدوري — تأكد من رابطك أو سجل دخولك.
  </div>

  <!-- Content -->
  <div id="pageContent" style="display:none">

    <!-- Hero -->
    <div class="hero-bar">
      <div class="hero-left">
        <div class="hero-icon" id="heroIcon">🏆</div>
        <div class="hero-info">
          <h1 id="heroName">—</h1>
          <div class="hero-meta">
            <span class="meta-pill" id="heroPillMembers"><i class="bi bi-people-fill"></i> —</span>
            <span class="meta-pill gold" id="heroPillRole">—</span>
          </div>
        </div>
      </div>
      <div class="code-box">
        <div>
          <div class="code-label">رمز الدعوة</div>
          <div class="code-val" id="heroCode">——</div>
        </div>
        <button class="copy-btn" onclick="copyCode()">
          <i class="bi bi-copy"></i> نسخ
        </button>
      </div>
    </div>

    <!-- Grid -->
    <div class="grid">

      <!-- Leaderboard -->
      <div class="card">
        <div class="card-title"><i class="bi bi-trophy-fill"></i> ترتيب الأعضاء</div>
        <div id="leaderboardBox"><div class="loading"><div class="spinner"></div></div></div>
      </div>

      <!-- Sidebar -->
      <div>
        <!-- Features -->
        <div class="card">
          <div class="card-title"><i class="bi bi-lightning-charge-fill"></i> الخصائص المتاحة</div>
          <div id="featuresBox"><div class="loading"><div class="spinner"></div></div></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal: تفعيل خاصية -->
<div class="overlay" id="useCardOverlay" onclick="handleOverlay(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeOverlay()">×</button>
    <h2 id="cardModalTitle">تفعيل الخاصية</h2>
    <p id="cardModalDesc"></p>

    <!-- اختيار الجولة (للدرع) -->
    <div id="shieldRoundWrap" style="display:none">
      <label style="font-size:13px;color:var(--muted);font-weight:700;display:block;margin-bottom:8px">اختر الجولة للحماية:</label>
      <select id="shieldRoundSelect"></select>
    </div>

    <!-- اختيار المباراة (للسرقة والإنقاذ والذهبية) -->
    <div id="matchSelectWrap" style="display:none">
      <label style="font-size:13px;color:var(--muted);font-weight:700;display:block;margin-bottom:8px" id="matchSelectLabel">اختر المباراة:</label>
      <select id="matchSelect"></select>
    </div>

    <!-- اختيار اللاعب المستهدف (للسرقة) -->
    <div id="targetPlayerWrap" style="display:none">
      <label style="font-size:13px;color:var(--muted);font-weight:700;display:block;margin-bottom:8px">اختر اللاعب:</label>
      <select id="targetPlayerSelect" onchange="loadStealableMatches()"></select>
      <div id="stealMatchWrap" style="display:none;margin-top:14px">
        <label style="font-size:13px;color:var(--muted);font-weight:700;display:block;margin-bottom:8px">اختر التوقع للسرقة:</label>
        <select id="stealMatchSelect"></select>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeOverlay()">إلغاء</button>
      <button class="btn btn-gold" onclick="confirmUseCard()">
        <i class="bi bi-check-circle-fill"></i> تفعيل
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var LEAGUE_ID  = new URLSearchParams(location.search).get('id');
var myUid      = null;
var myRole     = null;
var leagueData = null;
var activeCard = null;
var allRounds  = [];
var allMatches = [];

var FEATURES_META = {
    black_horse:  { name:'الحصان الأسود',   icon:'🐎', desc:'توقع الفريق الأضعف ونقاطك تتضاعف إذا فاز.' },
    golden_match: { name:'المباراة الذهبية', icon:'⭐', desc:'حدد مباراة تكون نقاطها مضاعفة.' },
    steal:        { name:'بطاقة السرقة',     icon:'🕵️', desc:'اسرق توقع من لاعب آخر قبل بدء المباراة.' },
    shield:       { name:'بطاقة الدرع',      icon:'🛡️', desc:'احمِ نفسك من السرقة لجولة كاملة.' },
    rescue:       { name:'بطاقة الإنقاذ',   icon:'🆘', desc:'احصل على نقطة إضافية إذا صح فارق الأهداف.' },
};

// ── Boot ───────────────────────────────────────────────────────────────────
if (!LEAGUE_ID) { showError(); }
else { loadAll(); }

async function loadAll() {
    try {
        const [dataRes, usageRes] = await Promise.all([
            fetch('/api/private-leagues/' + LEAGUE_ID),
            fetch('/api/private-leagues/' + LEAGUE_ID + '/my-usage')
        ]);
        const data  = await dataRes.json();
        const usage = await usageRes.json();

        if (!data || !data.league) { showError(); return; }

        leagueData = data;
        myRole = data.league.my_role;
        myUid  = data.league.my_uid;

        renderHero(data.league, data.leaderboard);
        renderLeaderboard(data.leaderboard);
        renderFeatures(data.features, usage?.usage || []);

        document.getElementById('pageLoading').style.display = 'none';
        document.getElementById('pageContent').style.display = 'block';

        loadRoundsAndMatches();
    } catch(e) { showError(); }
}

// ── Hero ───────────────────────────────────────────────────────────────────
function renderHero(league, leaderboard) {
    document.title = league.name + ' — ملك التوقعات';
    document.getElementById('heroIcon').textContent   = league.icon || '🏆';
    document.getElementById('heroName').textContent   = league.name;
    document.getElementById('heroCode').textContent   = league.code;
    document.getElementById('heroPillMembers').innerHTML =
        '<i class="bi bi-people-fill"></i> ' + (leaderboard?.length || 0) + ' / ' + league.max_members + ' عضو';
    document.getElementById('heroPillRole').textContent =
        myRole === 'owner' ? '👑 مدير' : '🎮 لاعب';
}

// ── Leaderboard ────────────────────────────────────────────────────────────
function renderLeaderboard(leaderboard) {
    var box = document.getElementById('leaderboardBox');
    if (!leaderboard || leaderboard.length === 0) {
        box.innerHTML = '<div class="empty-box">لا يوجد أعضاء بعد.</div>';
        return;
    }
    box.innerHTML = leaderboard.map(function(p, i) {
        var r = i + 1;
        var rc = r === 1 ? 'r1' : r === 2 ? 'r2' : r === 3 ? 'r3' : '';
        var medal = r <= 3 ? ['🥇','🥈','🥉'][r-1] : r;
        var isMe = String(p.Uid) === String(myUid);
        return '<div class="lb-row ' + (isMe ? 'me' : '') + '">' +
            '<div class="rank ' + rc + '">' + medal + '</div>' +
            '<div class="lb-name">' + p.Username + (isMe ? ' <span style="font-size:11px;color:var(--gold)">(أنت)</span>' : '') + '</div>' +
            '<div class="lb-pts">' + p.total_points + '<span>نقطة</span></div>' +
        '</div>';
    }).join('');
}

// ── Features ───────────────────────────────────────────────────────────────
function renderFeatures(features, usageArr) {
    var box = document.getElementById('featuresBox');
    if (!features) { box.innerHTML = '<div class="empty-box">لا توجد خصائص.</div>'; return; }

    var usageMap = {};
    usageArr.forEach(function(u) { usageMap[u.card_type] = u.used_count; });

    var keys = ['black_horse','golden_match','steal','shield','rescue'];
    box.innerHTML = keys.map(function(key) {
        var meta    = FEATURES_META[key];
        var enabled = !!features[key + '_enabled'];
        var limit   = features[key + '_limit'] || 0;
        var used    = usageMap[key] || 0;
        var rem     = Math.max(0, limit - used);
        var pct     = limit > 0 ? Math.min(100, used / limit * 100) : 0;
        var full    = rem === 0 && enabled;

        return '<div class="feat-card ' + (enabled ? 'enabled' : 'disabled') + '">' +
            '<div class="feat-top">' +
                '<div class="feat-icon">' + meta.icon + '</div>' +
                '<div class="feat-info">' +
                    '<div class="feat-name">' + meta.name + '</div>' +
                    '<div class="feat-desc">' + meta.desc + '</div>' +
                '</div>' +
                '<span class="feat-status ' + (enabled ? 'on' : 'off') + '">' + (enabled ? 'متاحة' : 'مغلقة') + '</span>' +
            '</div>' +
            (enabled ? `
            <div class="usage-bar-wrap">
                <div class="usage-label">
                    <span>الاستخدامات</span>
                    <strong>${rem} / ${limit} باقي</strong>
                </div>
                <div class="bar-bg"><div class="bar-fill ${full ? 'full' : ''}" style="width:${pct}%"></div></div>
            </div>
            <button class="use-btn" onclick="openUseCard('${key}')" ${full ? 'disabled' : ''}>
                ${full ? '✕ نفذت الاستخدامات' : meta.icon + ' استخدم ' + meta.name}
            </button>` : '') +
        '</div>';
    }).join('');
}

// ── Load rounds & matches ──────────────────────────────────────────────────
function loadRoundsAndMatches() {
    fetch('/api/current-round')
        .then(function(r) { return r.json(); })
        .then(function(round) { if (round) allRounds = [round]; });
}

// ── Open card modal ────────────────────────────────────────────────────────
function openUseCard(cardKey) {
    activeCard = cardKey;
    var meta = FEATURES_META[cardKey];

    document.getElementById('cardModalTitle').textContent = meta.icon + ' ' + meta.name;
    document.getElementById('cardModalDesc').textContent  = meta.desc;

    // إخفاء كل الأقسام
    ['shieldRoundWrap','matchSelectWrap','targetPlayerWrap','stealMatchWrap'].forEach(function(id) {
        document.getElementById(id).style.display = 'none';
    });

    if (cardKey === 'shield') {
        // جيب الجولات
        var sel = document.getElementById('shieldRoundSelect');
        sel.innerHTML = '<option value="">جاري التحميل...</option>';
        fetch('/api/current-round')
            .then(function(r) { return r.json(); })
            .then(function(round) {
                if (round) sel.innerHTML = '<option value="' + round.Rid + '">' + round.round_name + '</option>';
                else sel.innerHTML = '<option value="">لا توجد جولة حالية</option>';
            });
        document.getElementById('shieldRoundWrap').style.display = 'block';

    } else if (cardKey === 'golden_match' || cardKey === 'rescue') {
        // جيب المباريات القادمة
        var label = cardKey === 'golden_match' ? 'اختر المباراة الذهبية:' : 'اختر المباراة:';
        document.getElementById('matchSelectLabel').textContent = label;
        loadUpcomingMatches(document.getElementById('matchSelect'));
        document.getElementById('matchSelectWrap').style.display = 'block';

    } else if (cardKey === 'steal') {
        // جيب الأعضاء الآخرين
        var playerSel = document.getElementById('targetPlayerSelect');
        playerSel.innerHTML = '<option value="">جاري التحميل...</option>';
        var leaderboard = leagueData?.leaderboard || [];
        playerSel.innerHTML = leaderboard
            .filter(function(p) { return String(p.Uid) !== String(myUid); })
            .map(function(p) { return '<option value="' + p.Uid + '">' + p.Username + '</option>'; })
            .join('');
        if (!playerSel.innerHTML) playerSel.innerHTML = '<option value="">لا يوجد أعضاء آخرون</option>';
        document.getElementById('targetPlayerWrap').style.display = 'block';

    } else if (cardKey === 'black_horse') {
        // الحصان الأسود: لا يحتاج اختيار — يُفعّل على التوقع مباشرة
        document.getElementById('cardModalDesc').textContent =
            'بطاقة الحصان الأسود تُفعَّل تلقائياً عند توقع مباراة فيها فريق أضعف. استخدمها من صفحة التوقعات مباشرة.';
    }

    document.getElementById('useCardOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function loadUpcomingMatches(sel) {
    sel.innerHTML = '<option>جاري التحميل...</option>';
    // جيب المباريات عبر الـ tournaments في الدوري
    fetch('/api/private-leagues/' + LEAGUE_ID)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var tournaments = [];
            // نستخدم أي بطولة مرتبطة
            if (data.league) {
                fetch('/api/matches/' + (data.league.tournament_id || 1))
                    .then(function(r) { return r.json(); })
                    .then(function(matches) {
                        var upcoming = matches.filter(function(m) {
                            return m.home_score === null && new Date(m.match_date) > new Date();
                        });
                        if (!upcoming.length) {
                            sel.innerHTML = '<option value="">لا توجد مباريات قادمة</option>';
                            return;
                        }
                        sel.innerHTML = upcoming.map(function(m) {
                            return '<option value="' + m.Mid + '">' + m.home_team + ' ضد ' + m.away_team + '</option>';
                        }).join('');
                    });
            }
        });
}

function loadStealableMatches() {
    var targetId = document.getElementById('targetPlayerSelect').value;
    if (!targetId) return;
    var wrap = document.getElementById('stealMatchWrap');
    var sel  = document.getElementById('stealMatchSelect');
    wrap.style.display = 'none';
    sel.innerHTML = '<option>جاري التحميل...</option>';

    fetch('/api/private-leagues/' + LEAGUE_ID + '/stealable?target_user_id=' + targetId)
        .then(function(r) { return r.json(); })
        .then(function(rows) {
            if (!rows || rows.length === 0) {
                sel.innerHTML = '<option value="">لا توجد توقعات قابلة للسرقة</option>';
            } else {
                sel.innerHTML = rows.map(function(p) {
                    return '<option value="' + p.id + '">' + p.home_team + ' ضد ' + p.away_team +
                        ' (' + p.predicted_home_score + '-' + p.predicted_away_score + ')</option>';
                }).join('');
            }
            wrap.style.display = 'block';
        });
}

// ── Confirm use card ───────────────────────────────────────────────────────
function confirmUseCard() {
    if (activeCard === 'black_horse') {
        closeOverlay();
        showToast('🐎 افعّل الحصان الأسود من صفحة التوقعات');
        return;
    }

    var endpoint = '/api/private-leagues/' + LEAGUE_ID + '/';
    var body = {};

    if (activeCard === 'shield') {
        var round_id = document.getElementById('shieldRoundSelect').value;
        if (!round_id) { showToast('⚠️ اختر الجولة'); return; }
        endpoint += 'shield';
        body = { round_id };

    } else if (activeCard === 'golden_match') {
        var match_id = document.getElementById('matchSelect').value;
        if (!match_id) { showToast('⚠️ اختر المباراة'); return; }
        endpoint += 'golden-match';
        body = { match_id };

    } else if (activeCard === 'rescue') {
        var match_id = document.getElementById('matchSelect').value;
        if (!match_id) { showToast('⚠️ اختر المباراة'); return; }
        endpoint += 'rescue';
        body = { match_id };

    } else if (activeCard === 'steal') {
        var target_user_id  = document.getElementById('targetPlayerSelect').value;
        var prediction_id   = document.getElementById('stealMatchSelect').value;
        if (!target_user_id || !prediction_id) { showToast('⚠️ اختر اللاعب والتوقع'); return; }
        endpoint += 'steal';
        body = { target_user_id, prediction_id };
    }

    fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (!data.success) { showToast('❌ ' + data.message); return; }
        showToast('✅ ' + data.message);
        closeOverlay();
        loadAll();
    })
    .catch(function() { showToast('❌ حدث خطأ'); });
}

// ── Helpers ────────────────────────────────────────────────────────────────
function closeOverlay() {
    document.getElementById('useCardOverlay').classList.remove('open');
    document.body.style.overflow = '';
    activeCard = null;
}
function handleOverlay(e) {
    if (e.target.id === 'useCardOverlay') closeOverlay();
}
function copyCode() {
    var code = document.getElementById('heroCode').textContent;
    navigator.clipboard.writeText(code).then(function() { showToast('تم نسخ الرمز ✓'); });
}
function showError() {
    document.getElementById('pageLoading').style.display = 'none';
    document.getElementById('pageError').style.display = 'block';
}
function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2500);
}
</script>
