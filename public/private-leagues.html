<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الدوريات الخاصة — ملك التوقعات</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#ffd43b;--gold-dim:rgba(255,212,59,.12);--gold-border:rgba(255,212,59,.25);
  --bg:#060e1c;--surface:#0c1729;--surface2:#101f38;
  --text:#e8edf8;--muted:#7a90b5;--radius:18px;--radius-sm:12px;
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse 80% 50% at 80% -10%,rgba(36,59,115,.45) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 10% 90%,rgba(15,30,80,.3) 0%,transparent 55%);}

/* NAV */
.nav{height:60px;background:rgba(6,14,28,.95);border-bottom:1px solid var(--gold-border);
  display:flex;align-items:center;justify-content:space-between;padding:0 16px;
  position:sticky;top:0;z-index:200;backdrop-filter:blur(12px);}
.logo{color:var(--gold);font-size:18px;font-weight:900;text-decoration:none;display:flex;align-items:center;gap:6px}
.nav-links{display:flex;gap:2px}
.nav-links a{color:var(--muted);text-decoration:none;font-size:13px;font-weight:600;
  padding:6px 10px;border-radius:20px;transition:.2s;display:flex;align-items:center;gap:4px}
.nav-links a:hover,.nav-links a.active{color:var(--text);background:var(--surface2)}
.nav-links a span{display:none}
@media(min-width:600px){.nav-links a span{display:inline}.nav{padding:0 24px}}
@media(min-width:900px){.nav{padding:0 40px}.logo{font-size:20px}}

/* CONTAINER */
.container{width:100%;max-width:700px;margin:0 auto;padding:20px 16px 80px}
@media(min-width:600px){.container{padding:28px 20px 80px}}

/* PAGE HEADER */
.page-header{margin-bottom:20px}
.page-header h1{font-size:24px;font-weight:900;color:var(--gold);margin-bottom:4px;
  display:flex;align-items:center;gap:8px}
.page-header p{color:var(--muted);font-size:14px}
@media(min-width:600px){.page-header h1{font-size:30px}}

/* JOIN BOX */
.join-box{background:var(--surface);border:1px solid rgba(255,255,255,.07);
  border-radius:20px;padding:18px;margin-bottom:14px}
.join-box-title{font-size:14px;font-weight:700;color:var(--muted);
  margin-bottom:12px;display:flex;align-items:center;gap:6px}
.join-row{display:flex;gap:10px}
.join-row input{flex:1;padding:12px 14px;background:var(--surface2);
  border:1.5px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);
  color:var(--text);font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;
  letter-spacing:2px;outline:none;transition:border-color .2s;text-transform:uppercase;min-width:0}
.join-row input:focus{border-color:var(--gold)}
.join-row input::placeholder{letter-spacing:0;font-weight:400;text-transform:none;font-size:13px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 20px;border-radius:var(--radius-sm);
  font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:.2s}
.btn-gold{background:linear-gradient(135deg,var(--gold),#f0a500);color:#060e1c;
  box-shadow:0 4px 16px rgba(255,212,59,.25)}
.btn-gold:hover{opacity:.9}
.btn-outline{background:transparent;border:1.5px solid var(--gold-border);color:var(--text)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-full{width:100%;margin-bottom:14px}

/* SECTION TITLE */
.section-title{font-size:16px;font-weight:800;color:var(--text);
  margin:20px 0 14px;display:flex;align-items:center;gap:8px}
.section-title i{color:var(--gold)}

/* LEAGUE CARD */
.league-card{background:var(--surface);border:1px solid rgba(255,255,255,.07);
  border-radius:20px;padding:18px;margin-bottom:12px;
  cursor:pointer;text-decoration:none;color:inherit;display:block;
  transition:border-color .2s,transform .15s}
.league-card:hover{border-color:var(--gold-border);transform:translateY(-2px)}
.league-card.owner-card{border-color:rgba(255,212,59,.2)}

.lc-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.lc-icon{width:46px;height:46px;border-radius:13px;background:var(--gold-dim);
  border:1.5px solid var(--gold-border);display:flex;align-items:center;
  justify-content:center;font-size:22px;flex-shrink:0}
.lc-info{flex:1;min-width:0}
.lc-info h3{font-size:16px;font-weight:800;margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lc-role{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:20px;
  background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)}
.lc-role.member{background:rgba(255,255,255,.05);color:var(--muted);border-color:rgba(255,255,255,.08)}

.lc-stats{display:flex;gap:8px;margin-bottom:12px}
.lc-stat{flex:1;background:var(--surface2);border-radius:10px;padding:10px;text-align:center}
.lc-stat .val{font-size:20px;font-weight:900;color:var(--gold)}
.lc-stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}

.lc-code{padding:10px 14px;background:var(--gold-dim);border:1px solid var(--gold-border);
  border-radius:10px;display:flex;align-items:center;justify-content:space-between}
.lc-code-left span{font-size:11px;color:var(--muted);display:block;margin-bottom:2px}
.lc-code-left strong{font-size:18px;font-weight:900;color:var(--gold);letter-spacing:3px}
.copy-mini{background:var(--surface2);border:1px solid rgba(255,255,255,.1);
  border-radius:8px;padding:6px 12px;color:var(--muted);cursor:pointer;
  font-size:14px;transition:color .2s;display:flex;align-items:center;gap:4px}
.copy-mini:hover{color:var(--gold)}

/* EMPTY */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state i{font-size:44px;display:block;margin-bottom:14px;color:rgba(255,212,59,.3)}
.empty-state h3{font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty-state p{font-size:13px;line-height:1.7}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;gap:10px;
  padding:40px;color:var(--muted);font-size:14px}
.spinner{width:20px;height:20px;border:2px solid rgba(255,212,59,.2);
  border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
@media(min-width:600px){.overlay{align-items:center}}

.modal{background:#0c1729;border:1px solid var(--gold-border);
  border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:24px 20px;
  position:relative;transform:translateY(100%);transition:transform .3s}
.overlay.open .modal{transform:translateY(0)}
@media(min-width:600px){
  .modal{border-radius:24px;max-width:560px;padding:30px;
    transform:translateY(20px)}
  .overlay.open .modal{transform:translateY(0)}
}

.modal-close{position:absolute;top:14px;left:14px;background:none;border:none;
  color:var(--muted);font-size:22px;cursor:pointer;transition:color .2s;line-height:1;padding:4px}
.modal-close:hover{color:var(--text)}
.modal h2{font-size:20px;font-weight:900;color:var(--gold);margin-bottom:20px;
  display:flex;align-items:center;gap:10px}

/* FORM */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:7px}
.form-group input,.form-group select{
  width:100%;padding:12px 14px;background:var(--surface2);
  border:1.5px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);
  color:var(--text);font-family:'Cairo',sans-serif;font-size:15px;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--gold)}
.form-group select option{background:#0c1729}

/* ICON PICKER */
.icon-grid{display:flex;gap:8px;flex-wrap:wrap}
.icon-opt{width:44px;height:44px;border-radius:10px;border:1.5px solid rgba(255,255,255,.1);
  background:var(--surface2);display:flex;align-items:center;justify-content:center;
  font-size:22px;cursor:pointer;transition:all .2s}
.icon-opt:hover{border-color:var(--gold-border)}
.icon-opt.selected{border-color:var(--gold);background:var(--gold-dim)}

/* TOURNAMENT LIST */
.t-item{display:flex;align-items:center;gap:10px;padding:11px 14px;
  background:var(--surface2);border:1.5px solid rgba(255,255,255,.07);
  border-radius:var(--radius-sm);cursor:pointer;transition:border-color .2s;margin-bottom:8px}
.t-item:hover{border-color:var(--gold-border)}
.t-item.selected{border-color:var(--gold);background:var(--gold-dim)}
.t-check{width:20px;height:20px;border-radius:6px;border:2px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:12px}
.t-item.selected .t-check{background:var(--gold);border-color:var(--gold);color:#060e1c}
.t-name{font-size:14px;font-weight:700}

/* FEATURES */
.feat-row{background:var(--surface2);border:1.5px solid rgba(255,255,255,.07);
  border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;transition:border-color .2s}
.feat-row.feat-on{border-color:var(--gold-border)}
.feat-top{display:flex;align-items:center;gap:10px}
.feat-icon-sm{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.feat-text{flex:1}
.feat-name{font-size:13px;font-weight:700}
.feat-desc{font-size:11px;color:var(--muted);margin-top:1px}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{display:none}
.toggle-track{width:100%;height:100%;border-radius:30px;background:rgba(255,255,255,.1);
  cursor:pointer;transition:background .25s;display:block}
.toggle input:checked+.toggle-track{background:var(--gold)}
.toggle-thumb{position:absolute;top:3px;right:3px;width:18px;height:18px;
  border-radius:50%;background:white;transition:transform .25s;pointer-events:none}
.toggle input:checked~.toggle-thumb{transform:translateX(-20px)}
.feat-limit{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;gap:10px}
.feat-limit label{font-size:12px;color:var(--muted);font-weight:600}
.feat-limit input{width:70px;padding:7px 10px;border-radius:8px;font-size:14px;text-align:center;
  background:var(--surface);border:1.5px solid rgba(255,255,255,.1);color:var(--text);
  font-family:'Cairo',sans-serif;outline:none}

/* DIVIDER */
.divider{border:none;border-top:1px solid rgba(255,255,255,.07);margin:18px 0}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#1a2d50;border:1px solid var(--gold-border);border-radius:12px;
  padding:10px 20px;font-size:14px;font-weight:600;color:var(--gold);
  opacity:0;transition:.3s;pointer-events:none;z-index:999;white-space:nowrap;
  max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<nav class="nav">
  <a class="logo" href="/dashboard">
    <i class="bi bi-award-fill"></i> ملك التوقعات
  </a>
  <div class="nav-links">
    <a href="/dashboard"><i class="bi bi-house-fill"></i><span> الرئيسية</span></a>
    <a href="/predict"><i class="bi bi-lightning-charge-fill"></i><span> توقع</span></a>
    <a href="/leaderboard"><i class="bi bi-trophy-fill"></i><span> المتصدرون</span></a>
    <a href="/private-leagues" class="active"><i class="bi bi-shield-fill"></i><span> الدوريات</span></a>
  </div>
</nav>

<div class="container">

  <div class="page-header">
    <h1><i class="bi bi-shield-fill"></i> الدوريات الخاصة</h1>
    <p>أنشئ دوري خاص مع أصحابك أو انضم برمز الدعوة</p>
  </div>

  <!-- JOIN -->
  <div class="join-box">
    <div class="join-box-title"><i class="bi bi-door-open-fill"></i> انضم بالرمز</div>
    <div class="join-row">
      <input type="text" id="joinCodeInput" placeholder="أدخل رمز الدوري (مثال: AB3X9K)" maxlength="6">
      <button class="btn btn-outline" onclick="joinLeague()">
        <i class="bi bi-box-arrow-in-right"></i>
      </button>
    </div>
  </div>

  <!-- CREATE -->
  <button class="btn btn-gold btn-full" onclick="openCreateModal()">
    <i class="bi bi-plus-circle-fill"></i> إنشاء دوري جديد
  </button>

  <!-- MY LEAGUES -->
  <div class="section-title">
    <i class="bi bi-collection-fill"></i> دورياتي
  </div>

  <div id="leaguesContainer">
    <div class="loading"><div class="spinner"></div> جاري التحميل...</div>
  </div>

</div>

<!-- CREATE MODAL -->
<div class="overlay" id="createOverlay" onclick="handleOverlayClick(event,'createOverlay')">
<div class="modal">
  <button class="modal-close" onclick="closeModal('createOverlay')">×</button>
  <h2><i class="bi bi-plus-circle-fill"></i> إنشاء دوري</h2>

  <div class="form-group">
    <label>اسم الدوري</label>
    <input type="text" id="leagueName" placeholder="مثال: دوري الأصدقاء" maxlength="60">
  </div>

  <div class="form-group">
    <label>أيقونة الدوري</label>
    <div class="icon-grid" id="iconGrid"></div>
  </div>

  <div class="form-group">
    <label>الحد الأقصى للأعضاء</label>
    <select id="maxMembers">
      <option value="5">5 أعضاء</option>
      <option value="10">10 أعضاء</option>
      <option value="15">15 عضو</option>
      <option value="20" selected>20 عضو</option>
      <option value="30">30 عضو</option>
    </select>
  </div>

  <div class="form-group">
    <label>البطولات المشمولة</label>
    <div id="tournamentList"><div class="loading" style="padding:16px"><div class="spinner"></div></div></div>
  </div>

  <hr class="divider">

  <div style="font-size:14px;font-weight:800;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px">
    <i class="bi bi-lightning-fill" style="color:var(--gold)"></i> الخصائص الخاصة
  </div>
  <div id="featuresForm"></div>

  <button class="btn btn-gold btn-full" onclick="createLeague()" style="margin-top:8px">
    <i class="bi bi-check-circle-fill"></i> إنشاء الدوري
  </button>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const ICONS = ['🏆','⚽','🥇','🔥','👑','⚡','🎯','💎','🛡️','🦁','🚀','🌟'];

const FEATURES_CONFIG = [
  { key:'black_horse',  name:'الحصان الأسود',   desc:'توقع الفريق الأضعف بنقاط مضاعفة', icon:'🐎', default:2 },
  { key:'golden_match', name:'المباراة الذهبية', desc:'مباراة واحدة بنقاط مضاعفة',        icon:'⭐', default:1 },
  { key:'steal',        name:'بطاقة السرقة',     desc:'سرقة توقع من لاعب آخر',            icon:'🕵️', default:1 },
  { key:'shield',       name:'بطاقة الدرع',      desc:'الحماية من السرقة لجولة كاملة',    icon:'🛡️', default:1 },
  { key:'rescue',       name:'بطاقة الإنقاذ',    desc:'نقطة إضافية إذا صح فارق الأهداف', icon:'🆘', default:2 },
];

let selectedIcon = ICONS[0];
let selectedTournaments = [];

document.addEventListener('DOMContentLoaded', function() {
  buildIconGrid();
  buildFeaturesForm();
  loadMyLeagues();
});

function buildIconGrid() {
  document.getElementById('iconGrid').innerHTML = ICONS.map((icon, i) =>
    `<div class="icon-opt ${i===0?'selected':''}" onclick="selectIcon('${icon}',this)">${icon}</div>`
  ).join('');
}

function selectIcon(icon, el) {
  selectedIcon = icon;
  document.querySelectorAll('.icon-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}

function buildFeaturesForm() {
  document.getElementById('featuresForm').innerHTML = FEATURES_CONFIG.map(f => `
    <div class="feat-row" id="feat-row-${f.key}">
      <div class="feat-top">
        <div class="feat-icon-sm">${f.icon}</div>
        <div class="feat-text">
          <div class="feat-name">${f.name}</div>
          <div class="feat-desc">${f.desc}</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="feat-${f.key}" onchange="toggleFeat('${f.key}',this.checked)">
          <span class="toggle-track"></span>
          <span class="toggle-thumb"></span>
        </label>
      </div>
      <div class="feat-limit" id="limit-${f.key}" style="display:none">
        <label>عدد الاستخدامات:</label>
        <input type="number" id="limit-val-${f.key}" value="${f.default}" min="1" max="20">
      </div>
    </div>
  `).join('');
}

function toggleFeat(key, checked) {
  document.getElementById('feat-row-'+key).classList.toggle('feat-on', checked);
  document.getElementById('limit-'+key).style.display = checked ? 'flex' : 'none';
}

function loadTournaments() {
  fetch('/api/tournaments').then(r=>r.json()).then(data => {
    const list = document.getElementById('tournamentList');
    if (!data || !data.length) { list.innerHTML = '<p style="color:var(--muted);font-size:13px">لا توجد بطولات</p>'; return; }
    list.innerHTML = data.map(t => `
      <div class="t-item" onclick="toggleTournament(${t.id},this)">
        <div class="t-check"><i class="bi bi-check"></i></div>
        <span class="t-name">${t.Tname}</span>
      </div>
    `).join('');
  }).catch(() => {
    document.getElementById('tournamentList').innerHTML = '<p style="color:var(--muted);font-size:13px">تعذر التحميل</p>';
  });
}

function toggleTournament(id, el) {
  el.classList.toggle('selected');
  const idx = selectedTournaments.indexOf(id);
  if (idx===-1) selectedTournaments.push(id); else selectedTournaments.splice(idx,1);
}

// ── جيب أيقونة emoji من القيمة المخزنة
function resolveIcon(val) {
  if (!val) return '🏆';
  // إذا كانت إيموجي مباشرة
  if ([...val].length <= 2) return val;
  // إذا كانت اسم مثل crown/trophy/etc
  const map = {crown:'👑',trophy:'🏆',ball:'⚽',fire:'🔥',eagle:'🦅',horse:'🐎',bolt:'⚡'};
  return map[val] || '🏆';
}

function loadMyLeagues() {
  fetch('/api/private-leagues/my').then(r=>r.json()).then(leagues => {
    const box = document.getElementById('leaguesContainer');
    if (!leagues || !leagues.length) {
      box.innerHTML = `<div class="empty-state">
        <i class="bi bi-shield-slash"></i>
        <h3>ما عندك دوريات بعد</h3>
        <p>أنشئ دوري خاص أو انضم لدوري موجود برمز الدعوة</p>
      </div>`; return;
    }
    box.innerHTML = leagues.map(l => `
      <a class="league-card ${l.role==='owner'?'owner-card':''}" href="/private-league.html?id=${l.id}">
        <div class="lc-top">
          <div class="lc-icon">${resolveIcon(l.icon)}</div>
          <div class="lc-info">
            <h3>${l.name}</h3>
            <span class="lc-role ${l.role==='owner'?'':'member'}">${l.role==='owner'?'👑 مدير':'🎮 لاعب'}</span>
          </div>
        </div>
        <div class="lc-stats">
          <div class="lc-stat"><div class="val">${l.members_count}</div><div class="lbl">عضو</div></div>
          <div class="lc-stat"><div class="val">${l.max_members}</div><div class="lbl">الحد الأقصى</div></div>
        </div>
        <div class="lc-code">
          <div class="lc-code-left">
            <span>رمز الدوري</span>
            <strong>${l.code}</strong>
          </div>
          <button class="copy-mini" onclick="event.preventDefault();copyCode('${l.code}')">
            <i class="bi bi-copy"></i> نسخ
          </button>
        </div>
      </a>
    `).join('');
  }).catch(() => {
    document.getElementById('leaguesContainer').innerHTML =
      '<div class="empty-state"><i class="bi bi-wifi-off"></i><h3>تعذر التحميل</h3></div>';
  });
}

function createLeague() {
  const name = document.getElementById('leagueName').value.trim();
  if (!name) { showToast('⚠️ اكتب اسم الدوري'); return; }
  if (!selectedTournaments.length) { showToast('⚠️ اختر بطولة واحدة على الأقل'); return; }

  const features = {};
  FEATURES_CONFIG.forEach(f => {
    const enabled = document.getElementById('feat-'+f.key).checked;
    const limit   = parseInt(document.getElementById('limit-val-'+f.key)?.value)||0;
    features[f.key] = { enabled, limit: enabled?limit:0 };
  });

  fetch('/api/private-leagues/create', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ name, icon:selectedIcon, max_members:parseInt(document.getElementById('maxMembers').value), tournaments:selectedTournaments, features })
  }).then(r=>r.json()).then(data => {
    if (!data.success) { showToast('❌ '+data.message); return; }
    showToast('✅ تم الإنشاء! الرمز: '+data.code);
    closeModal('createOverlay');
    loadMyLeagues();
  }).catch(()=>showToast('❌ حدث خطأ'));
}

function joinLeague() {
  const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
  if (code.length < 4) { showToast('⚠️ أدخل رمز الدوري'); return; }
  fetch('/api/private-leagues/join', {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code})
  }).then(r=>r.json()).then(data => {
    if (!data.success) { showToast('❌ '+data.message); return; }
    showToast('✅ '+data.message);
    document.getElementById('joinCodeInput').value = '';
    setTimeout(() => { window.location.href = '/private-league.html?id='+data.leagueId; }, 1200);
  }).catch(()=>showToast('❌ حدث خطأ'));
}

function openCreateModal() {
  selectedTournaments = [];
  document.getElementById('leagueName').value = '';
  document.querySelectorAll('.icon-opt').forEach((e,i)=>e.classList.toggle('selected',i===0));
  selectedIcon = ICONS[0];
  FEATURES_CONFIG.forEach(f => {
    const cb = document.getElementById('feat-'+f.key);
    if (cb) { cb.checked=false; toggleFeat(f.key,false); }
  });
  loadTournaments();
  document.getElementById('createOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow='';
}

function handleOverlayClick(e,id) { if(e.target.id===id) closeModal(id); }

function copyCode(code) {
  navigator.clipboard.writeText(code).then(()=>showToast('تم نسخ الرمز ✓'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
</body>
</html>
