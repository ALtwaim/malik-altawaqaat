<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الدوريات الخاصة — ملك التوقعات</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#ffd43b;--gold-dim:rgba(255,212,59,.12);--gold-border:rgba(255,212,59,.25);
  --bg:#060e1c;--surface:#0c1729;--surface2:#101f38;
  --text:#e8edf8;--muted:#7a90b5;
  --green:#22c55e;--red:#ef4444;
  --radius:18px;--radius-sm:12px;
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse 80% 50% at 80% -10%,rgba(36,59,115,.45) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 10% 90%,rgba(15,30,80,.3) 0%,transparent 55%);}

/* NAV */
.nav{height:64px;background:rgba(6,14,28,.9);border-bottom:1px solid var(--gold-border);
  display:flex;align-items:center;justify-content:space-between;padding:0 40px;
  position:sticky;top:0;z-index:200;backdrop-filter:blur(12px);}
.logo{color:var(--gold);font-size:20px;font-weight:900;text-decoration:none;display:flex;align-items:center;gap:8px}
.nav-links{display:flex;gap:6px}
.nav-links a{color:var(--muted);text-decoration:none;font-size:14px;font-weight:600;
  padding:7px 14px;border-radius:30px;transition:.2s;display:flex;align-items:center;gap:5px}
.nav-links a:hover,.nav-links a.active{color:var(--text);background:var(--surface2)}

/* CONTAINER */
.container{width:92%;max-width:1100px;margin:0 auto;padding:40px 0 80px}

/* PAGE HEADER */
.page-header{margin-bottom:32px}
.page-header h1{font-size:32px;font-weight:900;color:var(--gold);margin-bottom:6px}
.page-header p{color:var(--muted);font-size:15px}

/* ACTION BUTTONS */
.action-row{display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:var(--radius-sm);
  font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:.2s}
.btn-gold{background:linear-gradient(135deg,var(--gold),#f0a500);color:#060e1c}
.btn-gold:hover{opacity:.9;transform:translateY(-1px)}
.btn-outline{background:transparent;border:1.5px solid var(--gold-border);color:var(--text)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:10px}
.btn-danger{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#ef4444}

/* LEAGUES GRID */
.leagues-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}

.league-card{
  background:var(--surface);
  border:1px solid rgba(255,255,255,.07);
  border-radius:22px;padding:22px;
  cursor:pointer;
  transition:border-color .2s,transform .2s,box-shadow .2s;
  text-decoration:none;color:inherit;display:block;
}
.league-card:hover{border-color:var(--gold-border);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.4)}
.league-card.owner-card{border-color:rgba(255,212,59,.2)}

.lc-top{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.lc-icon{width:50px;height:50px;border-radius:14px;background:var(--gold-dim);
  border:1.5px solid var(--gold-border);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.lc-info h3{font-size:17px;font-weight:800;color:var(--text);margin-bottom:3px}
.lc-role{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:20px;
  background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)}
.lc-role.member{background:rgba(255,255,255,.05);color:var(--muted);border-color:rgba(255,255,255,.08)}

.lc-stats{display:flex;gap:10px}
.lc-stat{flex:1;background:var(--surface2);border-radius:10px;padding:10px 12px;text-align:center}
.lc-stat .val{font-size:18px;font-weight:900;color:var(--gold)}
.lc-stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}

.lc-code{margin-top:14px;padding:10px 14px;background:var(--gold-dim);border:1px solid var(--gold-border);
  border-radius:10px;display:flex;align-items:center;justify-content:space-between}
.lc-code span{font-size:13px;font-weight:600;color:var(--muted)}
.lc-code strong{font-size:16px;font-weight:900;color:var(--gold);letter-spacing:3px}
.copy-mini{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;transition:color .2s}
.copy-mini:hover{color:var(--gold)}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state i{font-size:48px;display:block;margin-bottom:16px;color:rgba(255,212,59,.3)}
.empty-state h3{font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px}
.empty-state p{font-size:14px;line-height:1.7}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;gap:12px;padding:60px;color:var(--muted)}
.spinner{width:22px;height:22px;border:2px solid rgba(255,212,59,.2);
  border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:#0c1729;border:1px solid var(--gold-border);border-radius:24px;
  width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:30px;
  transform:translateY(20px);transition:transform .25s;position:relative}
.overlay.open .modal{transform:translateY(0)}
.modal-close{position:absolute;top:16px;left:16px;background:none;border:none;
  color:var(--muted);font-size:22px;cursor:pointer;transition:color .2s;line-height:1}
.modal-close:hover{color:var(--text)}
.modal h2{font-size:22px;font-weight:900;color:var(--gold);margin-bottom:24px;
  display:flex;align-items:center;gap:10px}

/* FORM */
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:7px}
.form-group input,.form-group select{
  width:100%;padding:12px 14px;background:var(--surface2);
  border:1.5px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);
  color:var(--text);font-family:'Cairo',sans-serif;font-size:15px;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--gold)}
.form-group select option{background:#0c1729}

/* ICON PICKER */
.icon-grid{display:flex;gap:8px;flex-wrap:wrap}
.icon-opt{width:44px;height:44px;border-radius:10px;border:1.5px solid rgba(255,255,255,.1);
  background:var(--surface2);display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;transition:all .2s}
.icon-opt:hover{border-color:var(--gold-border)}
.icon-opt.selected{border-color:var(--gold);background:var(--gold-dim)}

/* TOURNAMENT CHECKBOXES */
.tournament-list{display:flex;flex-direction:column;gap:8px}
.t-item{display:flex;align-items:center;gap:10px;padding:11px 14px;
  background:var(--surface2);border:1.5px solid rgba(255,255,255,.07);
  border-radius:var(--radius-sm);cursor:pointer;transition:border-color .2s}
.t-item:hover{border-color:var(--gold-border)}
.t-item.selected{border-color:var(--gold);background:var(--gold-dim)}
.t-item input[type=checkbox]{display:none}
.t-check{width:20px;height:20px;border-radius:6px;border:2px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.t-item.selected .t-check{background:var(--gold);border-color:var(--gold);color:#060e1c}
.t-name{font-size:14px;font-weight:700}

/* FEATURES SECTION */
.features-section{margin-bottom:20px}
.features-section h3{font-size:15px;font-weight:800;color:var(--text);
  margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;gap:8px}

.feat-row{background:var(--surface2);border:1.5px solid rgba(255,255,255,.07);
  border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;transition:border-color .2s}
.feat-row.feat-on{border-color:var(--gold-border)}
.feat-top{display:flex;align-items:center;gap:12px}
.feat-icon{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.feat-text{flex:1}
.feat-name{font-size:14px;font-weight:700}
.feat-desc{font-size:11px;color:var(--muted);margin-top:2px}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{display:none}
.toggle-track{width:100%;height:100%;border-radius:30px;background:rgba(255,255,255,.1);
  cursor:pointer;transition:background .25s;display:block}
.toggle input:checked+.toggle-track{background:var(--gold)}
.toggle-thumb{position:absolute;top:3px;right:3px;width:18px;height:18px;
  border-radius:50%;background:white;transition:transform .25s;pointer-events:none}
.toggle input:checked~.toggle-thumb{transform:translateX(-20px)}

.feat-limit{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;gap:10px}
.feat-limit label{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap}
.feat-limit input{flex:1;padding:8px 12px;border-radius:8px;font-size:14px;max-width:100px}

/* DIVIDER */
.divider{border:none;border-top:1px solid rgba(255,255,255,.07);margin:22px 0}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#1a2d50;border:1px solid var(--gold-border);border-radius:12px;
  padding:11px 22px;font-size:14px;font-weight:600;color:var(--gold);
  opacity:0;transition:.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* JOIN BOX */
.join-box{background:var(--surface);border:1px solid rgba(255,255,255,.07);
  border-radius:22px;padding:24px;margin-bottom:28px;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.join-box input{flex:1;min-width:160px;padding:12px 16px;background:var(--surface2);
  border:1.5px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);
  color:var(--text);font-family:'Cairo',sans-serif;font-size:16px;font-weight:700;
  letter-spacing:2px;outline:none;transition:border-color .2s;text-transform:uppercase}
.join-box input:focus{border-color:var(--gold)}
.join-box input::placeholder{letter-spacing:0;font-weight:400;text-transform:none}

/* SECTION TITLE */
.section-title{font-size:18px;font-weight:800;color:var(--text);
  margin-bottom:18px;display:flex;align-items:center;gap:8px}
.section-title i{color:var(--gold)}

@media(max-width:700px){
  .nav{padding:0 16px}
  .container{width:96%;padding:24px 0 60px}
  .action-row{flex-direction:column}
  .btn{width:100%;justify-content:center}
  .join-box{flex-direction:column}
  .join-box input{width:100%}
  .leagues-grid{grid-template-columns:1fr}
  .modal{padding:22px 18px}
}
</style>
</head>
<body>

<nav class="nav">
  <a class="logo" href="/dashboard">
    <i class="bi bi-award-fill"></i> ملك التوقعات
  </a>
  <div class="nav-links">
    <a href="/dashboard"><i class="bi bi-house-fill"></i> الرئيسية</a>
    <a href="/predict"><i class="bi bi-lightning-charge-fill"></i> توقع</a>
    <a href="/leaderboard"><i class="bi bi-trophy-fill"></i> المتصدرون</a>
    <a href="/private-leagues" class="active"><i class="bi bi-shield-fill"></i> الدوريات</a>
  </div>
</nav>

<div class="container">

  <div class="page-header">
    <h1><i class="bi bi-shield-fill" style="color:var(--gold)"></i> الدوريات الخاصة</h1>
    <p>أنشئ دوري خاص مع أصحابك أو انضم برمز الدعوة</p>
  </div>

  <!-- JOIN BOX -->
  <div class="join-box">
    <i class="bi bi-door-open" style="font-size:26px;color:var(--gold);flex-shrink:0"></i>
    <div style="flex:1">
      <div style="font-size:14px;font-weight:700;margin-bottom:8px">انضم بالرمز</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <input type="text" id="joinCodeInput" placeholder="أدخل رمز الدوري (مثال: AB3X9K)" maxlength="6">
        <button class="btn btn-outline" onclick="joinLeague()">
          <i class="bi bi-box-arrow-in-right"></i> انضمام
        </button>
      </div>
    </div>
  </div>

  <!-- ACTION -->
  <div class="action-row">
    <button class="btn btn-gold" onclick="openCreateModal()">
      <i class="bi bi-plus-circle-fill"></i> إنشاء دوري جديد
    </button>
  </div>

  <!-- MY LEAGUES -->
  <div class="section-title">
    <i class="bi bi-collection-fill"></i> دورياتي
  </div>

  <div id="leaguesContainer">
    <div class="loading"><div class="spinner"></div> جاري التحميل...</div>
  </div>

</div>

<!-- ═══ CREATE MODAL ═══ -->
<div class="overlay" id="createOverlay" onclick="handleOverlayClick(event,'createOverlay')">
<div class="modal" id="createModal">
  <button class="modal-close" onclick="closeModal('createOverlay')">×</button>
  <h2><i class="bi bi-plus-circle-fill"></i> إنشاء دوري</h2>

  <!-- اسم -->
  <div class="form-group">
    <label>اسم الدوري</label>
    <input type="text" id="leagueName" placeholder="مثال: دوري الأصدقاء" maxlength="60">
  </div>

  <!-- أيقونة -->
  <div class="form-group">
    <label>أيقونة الدوري</label>
    <div class="icon-grid" id="iconGrid"></div>
  </div>

  <!-- عدد الأعضاء -->
  <div class="form-group">
    <label>الحد الأقصى للأعضاء</label>
    <select id="maxMembers">
      <option value="5">5 أعضاء</option>
      <option value="10">10 أعضاء</option>
      <option value="15">15 عضو</option>
      <option value="20" selected>20 عضو</option>
      <option value="30">30 عضو</option>
    </select>
  </div>

  <!-- البطولات -->
  <div class="form-group">
    <label>البطولات المشمولة في الدوري</label>
    <div class="tournament-list" id="tournamentList">
      <div class="loading" style="padding:20px"><div class="spinner"></div></div>
    </div>
  </div>

  <hr class="divider">

  <!-- الخصائص -->
  <div class="features-section">
    <h3><i class="bi bi-lightning-fill" style="color:var(--gold)"></i> الخصائص الخاصة</h3>
    <div id="featuresForm"></div>
  </div>

  <button class="btn btn-gold" style="width:100%;justify-content:center;margin-top:8px" onclick="createLeague()">
    <i class="bi bi-check-circle-fill"></i> إنشاء الدوري
  </button>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const ICONS = ['🏆','⚽','🥇','🔥','👑','⚡','🎯','💎','🛡️','🦁','🚀','🌟'];

const FEATURES_CONFIG = [
    { key:'black_horse',  name:'الحصان الأسود',   desc:'توقع الفريق الأضعف بنقاط مضاعفة', icon:'🐎' },
    { key:'golden_match', name:'المباراة الذهبية', desc:'مباراة واحدة بنقاط مضاعفة',        icon:'⭐' },
    { key:'steal',        name:'بطاقة السرقة',     desc:'سرقة توقع من لاعب آخر',            icon:'🕵️' },
    { key:'shield',       name:'بطاقة الدرع',      desc:'الحماية من السرقة لجولة كاملة',    icon:'🛡️' },
    { key:'rescue',       name:'بطاقة الإنقاذ',    desc:'نقطة إضافية إذا صح فارق الأهداف', icon:'🆘' },
];

let selectedIcon = ICONS[0];
let selectedTournaments = [];

// ── Init ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
    buildIconGrid();
    buildFeaturesForm();
    loadMyLeagues();
});

// ── Icon Grid ──────────────────────────────────────────────────────────────
function buildIconGrid() {
    const grid = document.getElementById('iconGrid');
    grid.innerHTML = ICONS.map((icon, i) => `
        <div class="icon-opt ${i===0?'selected':''}" onclick="selectIcon('${icon}', this)">
            ${icon}
        </div>
    `).join('');
}

function selectIcon(icon, el) {
    selectedIcon = icon;
    document.querySelectorAll('.icon-opt').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
}

// ── Features Form ──────────────────────────────────────────────────────────
function buildFeaturesForm() {
    const box = document.getElementById('featuresForm');
    box.innerHTML = FEATURES_CONFIG.map(f => `
        <div class="feat-row" id="feat-row-${f.key}">
            <div class="feat-top">
                <div class="feat-icon">${f.icon}</div>
                <div class="feat-text">
                    <div class="feat-name">${f.name}</div>
                    <div class="feat-desc">${f.desc}</div>
                </div>
                <label class="toggle">
                    <input type="checkbox" id="feat-${f.key}" onchange="toggleFeat('${f.key}', this.checked)">
                    <span class="toggle-track"></span>
                    <span class="toggle-thumb"></span>
                </label>
            </div>
            <div class="feat-limit" id="limit-${f.key}" style="display:none">
                <label>عدد الاستخدامات لكل لاعب:</label>
                <input type="number" id="limit-val-${f.key}" value="2" min="1" max="20"
                    class="form-group input" style="max-width:80px;padding:8px 10px;border-radius:8px;
                    background:var(--surface);border:1.5px solid rgba(255,255,255,.1);color:var(--text);
                    font-family:'Cairo',sans-serif;font-size:14px;outline:none">
            </div>
        </div>
    `).join('');
}

function toggleFeat(key, checked) {
    const row   = document.getElementById('feat-row-' + key);
    const limit = document.getElementById('limit-' + key);
    row.classList.toggle('feat-on', checked);
    limit.style.display = checked ? 'flex' : 'none';
}

// ── Load Tournaments ────────────────────────────────────────────────────────
function loadTournaments() {
    fetch('/api/tournaments')
        .then(r => r.json())
        .then(data => {
            const list = document.getElementById('tournamentList');
            if (!data || data.length === 0) {
                list.innerHTML = '<p style="color:var(--muted);font-size:14px;padding:10px">لا توجد بطولات متاحة</p>';
                return;
            }
            list.innerHTML = data.map(t => `
                <div class="t-item" id="t-${t.id}" onclick="toggleTournament(${t.id}, this)">
                    <div class="t-check"><i class="bi bi-check" style="font-size:12px"></i></div>
                    <span class="t-name">${t.Tname}</span>
                </div>
            `).join('');
        })
        .catch(() => {
            document.getElementById('tournamentList').innerHTML =
                '<p style="color:var(--muted);font-size:14px;padding:10px">تعذر تحميل البطولات</p>';
        });
}

function toggleTournament(id, el) {
    el.classList.toggle('selected');
    const idx = selectedTournaments.indexOf(id);
    if (idx === -1) selectedTournaments.push(id);
    else selectedTournaments.splice(idx, 1);
}

// ── Load My Leagues ────────────────────────────────────────────────────────
function loadMyLeagues() {
    fetch('/api/private-leagues/my')
        .then(r => r.json())
        .then(leagues => {
            const box = document.getElementById('leaguesContainer');
            if (!leagues || leagues.length === 0) {
                box.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-shield-slash"></i>
                        <h3>ما عندك دوريات بعد</h3>
                        <p>أنشئ دوري خاص أو انضم لدوري موجود برمز الدعوة</p>
                    </div>`;
                return;
            }
            box.innerHTML = '<div class="leagues-grid">' +
                leagues.map(l => `
                    <a class="league-card ${l.role==='owner'?'owner-card':''}"
                       href="/private-league.html?id=${l.id}">
                        <div class="lc-top">
                            <div class="lc-icon">${l.icon || '🏆'}</div>
                            <div class="lc-info">
                                <h3>${l.name}</h3>
                                <span class="lc-role ${l.role==='owner'?'':'member'}">
                                    ${l.role==='owner' ? '👑 مدير' : '🎮 لاعب'}
                                </span>
                            </div>
                        </div>
                        <div class="lc-stats">
                            <div class="lc-stat">
                                <div class="val">${l.members_count}</div>
                                <div class="lbl">عضو</div>
                            </div>
                            <div class="lc-stat">
                                <div class="val">${l.max_members}</div>
                                <div class="lbl">الحد الأقصى</div>
                            </div>
                        </div>
                        <div class="lc-code">
                            <div>
                                <span>رمز الدوري</span>
                                <strong style="display:block">${l.code}</strong>
                            </div>
                            <button class="copy-mini" onclick="event.preventDefault();copyCode('${l.code}')" title="نسخ الرمز">
                                <i class="bi bi-copy"></i>
                            </button>
                        </div>
                    </a>
                `).join('') + '</div>';
        })
        .catch(() => {
            document.getElementById('leaguesContainer').innerHTML =
                '<div class="empty-state"><i class="bi bi-wifi-off"></i><h3>تعذر التحميل</h3><p>تحقق من اتصالك وأعد المحاولة</p></div>';
        });
}

// ── Create League ──────────────────────────────────────────────────────────
function createLeague() {
    const name = document.getElementById('leagueName').value.trim();
    if (!name) { showToast('⚠️ اكتب اسم الدوري'); return; }
    if (selectedTournaments.length === 0) { showToast('⚠️ اختر بطولة واحدة على الأقل'); return; }

    const features = {};
    FEATURES_CONFIG.forEach(f => {
        const enabled = document.getElementById('feat-' + f.key).checked;
        const limit   = parseInt(document.getElementById('limit-val-' + f.key)?.value) || 0;
        features[f.key] = { enabled, limit: enabled ? limit : 0 };
    });

    const body = {
        name,
        icon: selectedIcon,
        max_members: parseInt(document.getElementById('maxMembers').value),
        tournaments: selectedTournaments,
        features
    };

    fetch('/api/private-leagues/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    })
    .then(r => r.json())
    .then(data => {
        if (!data.success) { showToast('❌ ' + data.message); return; }
        showToast('✅ تم إنشاء الدوري! الرمز: ' + data.code);
        closeModal('createOverlay');
        loadMyLeagues();
    })
    .catch(() => showToast('❌ حدث خطأ، حاول مجدداً'));
}

// ── Join League ────────────────────────────────────────────────────────────
function joinLeague() {
    const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
    if (code.length !== 6) { showToast('⚠️ الرمز يجب أن يكون 6 أحرف'); return; }

    fetch('/api/private-leagues/join', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code })
    })
    .then(r => r.json())
    .then(data => {
        if (!data.success) { showToast('❌ ' + data.message); return; }
        showToast('✅ ' + data.message);
        document.getElementById('joinCodeInput').value = '';
        setTimeout(() => {
            window.location.href = '/private-league.html?id=' + data.leagueId;
        }, 1200);
    })
    .catch(() => showToast('❌ حدث خطأ، حاول مجدداً'));
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openCreateModal() {
    selectedTournaments = [];
    document.getElementById('leagueName').value = '';
    document.querySelectorAll('.icon-opt').forEach((e,i) => e.classList.toggle('selected', i===0));
    selectedIcon = ICONS[0];
    document.querySelectorAll('.t-item').forEach(e => e.classList.remove('selected'));
    FEATURES_CONFIG.forEach(f => {
        const cb = document.getElementById('feat-' + f.key);
        if (cb) { cb.checked = false; toggleFeat(f.key, false); }
    });
    loadTournaments();
    document.getElementById('createOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeModal(id) {
    document.getElementById(id).classList.remove('open');
    document.body.style.overflow = '';
}

function handleOverlayClick(e, id) {
    if (e.target.id === id) closeModal(id);
}

// ── Helpers ────────────────────────────────────────────────────────────────
function copyCode(code) {
    navigator.clipboard.writeText(code).then(() => showToast('تم نسخ الرمز ✓'));
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
